apiVersion: apps/v1
kind: Deployment
metadata:
  name: sre-agent
  namespace: aiops
  labels:
    app: sre-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sre-agent
  template:
    metadata:
      labels:
        app: sre-agent
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: sre-agent
      containers:
        - name: sre-agent
          image: 350480401763.dkr.ecr.ap-south-1.amazonaws.com/aiops-dev-sre-agent:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: AWS_REGION
              value: "ap-south-1"
            - name: AWS_DEFAULT_REGION
              value: "ap-south-1"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: sre-agent-service
  namespace: aiops
spec:
  selector:
    app: sre-agent
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
