apiVersion: v1
kind: Pod
metadata:
  name: oom-sim
  namespace: application
  labels:
    simulation: "true"
    scenario: "oom"
spec:
  containers:
    - name: oom
      image: polinux/stress
      command: ["stress"]
      args: ["--vm", "1", "--vm-bytes", "128M", "--vm-hang", "0"]
      resources:
        requests:
          cpu: 50m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 64Mi
