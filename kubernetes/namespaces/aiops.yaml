apiVersion: v1
kind: Namespace
metadata:
  name: aiops
  labels:
    name: aiops
    environment: dev
    project: aiops
    monitoring: "true"

---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: aiops-quota
  namespace: aiops
spec:
  hard:
    requests.cpu: "2"
    limits.cpu: "4"
    requests.memory: 4Gi
    limits.memory: 8Gi
    pods: "10"
    services: "10"

---
apiVersion: v1
kind: LimitRange
metadata:
  name: aiops-limits
  namespace: aiops
spec:
  limits:
  - type: Container
    default:
      cpu: "500m"
      memory: "512Mi"
    defaultRequest:
      cpu: "100m"
      memory: "128Mi"
    max:
      cpu: "2"
      memory: "2Gi"
    min:
      cpu: "50m"
      memory: "64Mi"

---
# ServiceAccount for SRE Agent
# This will be annotated with IAM role ARN in Phase 9 for Bedrock access
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sre-agent
  namespace: aiops
  labels:
    app: sre-agent
    project: aiops