apiVersion: v1
kind: Namespace
metadata:
  name: application
  labels:
    name: application
    environment: dev
    project: aiops
    # This label is used by Prometheus to discover the namespace
    monitoring: "true"

---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: application-quota
  namespace: application
spec:
  hard:
    # Maximum total CPU across all pods in this namespace
    requests.cpu: "2"
    limits.cpu: "4"
    # Maximum total memory across all pods in this namespace
    requests.memory: 4Gi
    limits.memory: 8Gi
    # Maximum number of pods
    pods: "20"
    # Maximum number of services
    services: "10"

---
apiVersion: v1
kind: LimitRange
metadata:
  name: application-limits
  namespace: application
spec:
  limits:
  - type: Container
    default:
      cpu: "500m"
      memory: "512Mi"
    defaultRequest:
      cpu: "100m"
      memory: "128Mi"
    max:
      cpu: "2"
      memory: "2Gi"
    min:
      cpu: "50m"
      memory: "64Mi"